<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Planilla de Empleados</title>
  <link rel="stylesheet" href="fondo.css">
</head>
<body>

  <h2>Registro de Empleados</h2>

  <label>Nombre:</label><br>
  <input type="text" id="nombre"><br>

  <label>Salario por Hora:</label><br>
  <input type="number" id="salarioHora"><br>

  <label>Horas Trabajadas:</label><br>
  <input type="number" id="horas"><br>

  <button onclick="agregarEmpleado()">Agregar</button>

  <h3>Planilla</h3>

  <table border="1" id="tabla">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Salario Base</th>
        <th>Horas Extra</th>
        <th>Salario Final</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h3>Resultados</h3>
  <p id="total"></p>
  <p id="mayor"></p>
  <p id="menor"></p>

  <script src="renderer.js"></script>
</body>
</html>
