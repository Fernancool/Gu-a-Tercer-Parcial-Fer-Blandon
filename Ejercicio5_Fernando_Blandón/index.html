<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tienda Papelería</title>
  <link rel="stylesheet" href="Fondo.css">
</head>
<body>

<h2>Agregar Producto</h2>

<input type="text" id="nombreProducto" placeholder="Nombre">
<input type="number" id="precioProducto" placeholder="Precio">
<input type="number" id="cantidadProducto" placeholder="Cantidad">
<button onclick="agregarProducto()">Agregar Producto</button>

<h2>Inventario</h2>

<table border="1" id="tabla">
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Precio</th>
      <th>Cantidad</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<h2>Registrar Venta</h2>

<select id="productoSelect"></select>
<input type="number" id="cantidadVenta" placeholder="Cantidad a vender">
<button onclick="registrarVenta()">Registrar Venta</button>

<h2>Reporte</h2>

<p id="totalVentas"></p>
<p id="masVendido"></p>
<p id="mayorGanancia"></p>

<script src="renderer.js"></script>

</body>
</html>
