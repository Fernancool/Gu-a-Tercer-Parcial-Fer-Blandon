<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ventas por Vendedor</title>
  <link rel="stylesheet" href="Fondo.css">
</head>
<body>

  <h2>Registro de Ventas</h2>

  <label>Nombre del Vendedor:</label><br>
  <input type="text" id="vendedor"><br>

  <label>Monto Vendido:</label><br>
  <input type="number" id="monto"><br>

  <label>Comisión (%):</label><br>
  <input type="number" id="comision"><br>

  <button onclick="agregarVenta()">Agregar</button>

  <h3>Ventas</h3>

  <table border="1" id="tabla">
    <thead>
      <tr>
        <th>Vendedor</th>
        <th>Monto</th>
        <th>Comisión</th>
        <th>Total Recibido</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h3>Resultados</h3>
  <p id="totalVendido"></p>
  <p id="totalComisiones"></p>
  <p id="mayor"></p>
  <p id="menor"></p>

  <script src="renderer.js"></script>
</body>
</html>
